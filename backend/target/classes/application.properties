spring.jpa.open-in-view=true

# SQLite Configuration
spring.datasource.url=jdbc:sqlite:./cozi.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA/Hibernate - Disable auto-commit and transactions for read operations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# SQLite transaction settings
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.open-in-view=false

# Disable transaction for read-only operations
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_HOLD

# Server configuration
server.error.include-message=always

# Debug logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.cozi.backend=DEBUG

cozi.jwt.secret=ReplaceThisSecretKeyForDevOnlyAndEnsureItIsAtLeast32BytesLong
cozi.jwt.expiration-ms=86400000
spring.jackson.serialization.write-dates-as-timestamps=false
