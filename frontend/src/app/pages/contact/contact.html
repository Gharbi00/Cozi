<div class="contact-form-section section-padding-02">
  <div class="container">
    <div class="row g-5 justify-content-between">
      <div class="col-lg-5">
        <div class="section-title-wrap">
          <div class="section-title">
            <h5 class="sub-title orange">Get Information</h5>
            <h2 class="title">Contact with us for coworking, coliving and local programs in Djerba.</h2>
          </div>
        </div>
        <div class="single-contact">
          <span class="contact-icon">
            <i class="fas fa-map-marker-alt"></i>
          </span>
          <div class="contact-info">
            <h4 class="contact-label">Our Location :</h4>
            <p class="address">La Marina, Houmet Essouk, Djerba, Tunisia</p>
          </div>
        </div>
        <div class="single-contact">
          <span class="contact-icon orange-color">
            <i class="flaticon-phone-call"></i>
          </span>
          <div class="contact-info">
            <h4 class="contact-label">24/7 Hotline</h4>
            <a href="tel:+21656550680" class="address">+216 56 550 680</a>
          </div>
        </div>
        <div class="single-contact">
          <span class="contact-icon blue-color">
            <i class="far fa-envelope"></i>
          </span>
          <div class="contact-info">
            <h4 class="contact-label">Email :</h4>
            <a href="mailto:contact@cozi.tn" class="address">contact@cozi.tn</a>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="map-section">
          <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13293.39418477719!2d10.836981460146068!3d33.80387968866007!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x13009354d422f643%3A0x7e3863f0ab86c44a!2sHoumt%20Souk%2C%20Djerba!5e0!3m2!1sen!2stn!4v0000000000000000" allowfullscreen="" loading="lazy"></iframe>
          </div>
        </div>
      </div>
    </div>
    <div class="contact-form-wrap">
      <form action="#" class="contact-form">
        <div class="row">
          <div class="col-12">
            <div class="section-title-wrap text-center">
              <div class="section-title">
                <h2 class="title">Send Us A Message</h2>
              </div>
            </div>
          </div>
        </div>
        <div class="row g-4 justify-content-center">
          <div class="col-lg-6">
            <input type="text" class="comment-form-input" placeholder="Your Name">
          </div>
          <div class="col-lg-6">
            <input type="email" class="comment-form-input" placeholder="Your Email">
          </div>
          <div class="col-lg-6">
            <input type="tel" class="comment-form-input" placeholder="Phone Number">
          </div>
          <div class="col-lg-6">
            <input type="text" class="comment-form-input" placeholder="Subject">
          </div>
          <div class="col-12">
            <textarea name="messege" placeholder="Your Message" class="comment-form-input"></textarea>
          </div>
          <div class="col-lg-3">
            <button type="submit" class="submit_btn">Submit Now</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
